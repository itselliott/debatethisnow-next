# Fly.io app config for the Next.js port. Mirrors the Python app's
# fly.toml except for the app name + memory bump.
#
# Edit `app` to match the Fly app you created with `fly apps create`.
# For the parity-test window, the staging app is `debatethisnow-next`
# bound to `next.debatethisnow.com`. Once cutover happens, repoint the
# `debatethisnow` Fly app at this Docker image (or scale this app up +
# rotate DNS — see DEPLOY.md).

app = 'debatethisnow-next'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  # NOTE: migrations are run MANUALLY from the developer's machine via
  # `npm run db:migrate:deploy` (with DIRECT_URL set in the local
  # `.env`). They are deliberately NOT chained into a `release_command`
  # here because Fly's release machine inherits whichever
  # DATABASE_URL secret is set — and our DATABASE_URL points at
  # Neon's pooled endpoint, which uses PgBouncer in transaction mode
  # and silently drops the session-level advisory lock that
  # `prisma migrate deploy` needs (causing P1002 timeouts and
  # crash-looping deploys).
  #
  # To re-enable automated migrations on deploy:
  #   1. Add a `DIRECT_URL` Fly secret pointing to the UNPOOLED Neon
  #      endpoint (drop the `-pooler` suffix from the hostname).
  #   2. Uncomment the line below.
  # release_command = 'npx prisma migrate deploy'

[env]
  # Defaults that don't need to be secrets. Real secret values
  # (DATABASE_URL, JWT_SECRET_KEY, SECRET_KEY, OAuth creds, LLM keys)
  # are set via `fly secrets set`.
  NODE_ENV = 'production'
  HOSTNAME = '0.0.0.0'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  # Bump from the Python app's 512MB. Node + Prisma client + Socket.IO
  # sit a bit heavier in resident memory; 1GB leaves headroom for spiky
  # debate-room broadcasts without OOM risk.
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
